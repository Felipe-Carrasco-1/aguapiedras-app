version: "3.8"

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: aguapiedras_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_NAME=aguapiedras_db
      - DATABASE_USER=root
      - DATABASE_PASSWORD=admin
      - PAYMENT_SERVICE_URL=http://pagos:8002
    depends_on:
      - db

  pagos:
    build:
      context: ./pagos
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=mysql://root:admin@db:3306/aguapiedras_db
      - MP_ACCESS_TOKEN=APP_USR-4795680976904507-050513-d428dd1b2f4fd762db76d5b2e9a55735-3379497295
      - MP_PUBLIC_KEY=APP_USR-f241cfcf-5f40-4c24-b58d-63c38b430566
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
