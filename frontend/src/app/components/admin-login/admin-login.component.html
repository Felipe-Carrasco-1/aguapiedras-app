<div class="row justify-content-center mt-5">
  <div class="col-md-5 mt-5">
    <div class="card shadow border-0 rounded-3 p-4">
      <div class="text-center mb-4">
        <h2 class="fw-bold text-success">Acceso Administración</h2>
        <p class="text-muted">Aguapiedras Booking System</p>
      </div>

      <div class="alert alert-danger" *ngIf="error">
        {{ error }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="mb-3">
          <label class="form-label text-secondary fw-semibold">Usuario</label>
          <input type="text" class="form-control form-control-lg" name="username" [(ngModel)]="username" required placeholder="Ingresa tu usuario">
        </div>
        
        <div class="mb-4">
          <label class="form-label text-secondary fw-semibold">Contraseña</label>
          <input type="password" class="form-control form-control-lg" name="password" [(ngModel)]="password" required placeholder="Ingresa tu contraseña">
        </div>

        <button type="submit" 
                class="btn btn-success btn-lg w-100 shadow-sm"
                [disabled]="!loginForm.valid || loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Iniciando sesión...' : 'Ingresar' }}
        </button>
      </form>
    </div>
  </div>
</div>
